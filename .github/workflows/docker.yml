name: build-image

# Собираем Docker-образ в CI и пушим в GHCR, чтобы не собирать на сервере
# (на слабом VPS `tsc` + npm install тянутся минутами). Сервер потом только
# `docker compose pull` — скачивает готовый образ за секунды.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/${{ github.repository }} # ghcr.io/callmekoo/summarizer-bot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # пуш в GHCR из-под GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Слоистый кэш между прогонами CI (включая npm-слой) — ускоряет пересборки.
          cache-from: type=gha
          cache-to: type=gha,mode=max
